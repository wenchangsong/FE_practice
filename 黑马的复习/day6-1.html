<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标准流和flex</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            list-style:none;
        }
        .one {
            width: 100px;
            height: 100px;
            background-color: rgb(104, 38, 38);
 }
 .two{
    width: 150px;
    height: 150px;
    background-color: aqua;
 }    
 .one1 {
            width: 100px;
            height: 100px;
            background-color: rgb(104, 38, 38);
            float: left;
            /* float使他们在一行显示 */
 }
 .two1{
    width: 150px;
    height: 150px;
    background-color: aqua;
    float: left;
 }



 .product{
    width: 1226px;
    height: 628px;
    background-color: pink;
 }
 .left {
    float: left;
    width: 234px;
    height: 628px;
    background-color: skyblue;
}

.right {
    float: right;
    width: 978px;
    height: 628px;
    background-color: brown;
}
.right li {
    float: left;
    margin-right: 14px;
    margin-bottom: 14px;
    width: 234px;
    height: 300px;
    background-color: orange;

}
.clearfix{
    clear: both;
}

/* 第四个li和第八个li去掉右侧的margin */
.right li:nth-child(4n) {
    margin-right: 0;
}
    </style>
</head>
<body>
    <div class="one"></div>
    <div class="two"></div>
    <br>
    <div class="one1"></div>
    <div class="two1"></div>
    
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <!-- 产品布局 -->
      <div class="product">
        <div class="left"></div>
        <div class="right">
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>
        
      </div>
</body>
</html>
